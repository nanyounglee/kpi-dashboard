
<h2 class="sr-only">SCM KPI 외주생산파트 대시보드 — 월별/주별 발주·이슈 지표 요약</h2>

<style>
  .kpi-dash { font-family: var(--font-sans); padding: 0; }
  .top-bar { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; margin-bottom: 20px; padding-bottom: 14px; border-bottom: 0.5px solid var(--color-border-tertiary); }
  .top-bar h1 { font-size: 16px; font-weight: 500; margin: 0; color: var(--color-text-primary); }
  .top-bar .sub { font-size: 12px; color: var(--color-text-secondary); margin-top: 2px; }
  .controls { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .seg { display: flex; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); overflow: hidden; }
  .seg button { background: transparent; border: none; padding: 6px 14px; font-size: 12px; cursor: pointer; color: var(--color-text-secondary); transition: background 0.15s; }
  .seg button.active { background: var(--color-background-secondary); color: var(--color-text-primary); font-weight: 500; }
  select { font-size: 12px; padding: 6px 10px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: var(--color-background-primary); color: var(--color-text-primary); cursor: pointer; }
  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 20px; }
  .card { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 12px 14px; }
  .card .label { font-size: 11px; color: var(--color-text-secondary); margin-bottom: 4px; }
  .card .val { font-size: 22px; font-weight: 500; color: var(--color-text-primary); line-height: 1.1; }
  .card .delta { font-size: 11px; margin-top: 3px; }
  .card .delta.up { color: #E24B4A; }
  .card .delta.down { color: #1D9E75; }
  .card .delta.neu { color: var(--color-text-secondary); }
  .section { margin-bottom: 24px; }
  .sec-title { font-size: 12px; font-weight: 500; color: var(--color-text-secondary); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.04em; }
  .chart-wrap { position: relative; width: 100%; }
  .legend { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 8px; font-size: 11px; color: var(--color-text-secondary); }
  .legend span { display: flex; align-items: center; gap: 4px; }
  .legend span b { width: 10px; height: 10px; border-radius: 2px; display: inline-block; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 520px) { .grid2 { grid-template-columns: 1fr; } }
  .person-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 0.5px solid var(--color-border-tertiary); font-size: 12px; }
  .person-row:last-child { border-bottom: none; }
  .person-bar-bg { background: var(--color-background-secondary); border-radius: 3px; height: 6px; flex: 1; margin: 0 10px; }
  .person-bar { background: #378ADD; height: 6px; border-radius: 3px; transition: width 0.4s; }
  .badge { display: inline-block; font-size: 10px; padding: 2px 7px; border-radius: var(--border-radius-md); font-weight: 500; }
  .badge-warn { background: #FAEEDA; color: #633806; }
  .badge-ok { background: #EAF3DE; color: #27500A; }
  .badge-danger { background: #FCEBEB; color: #791F1F; }
  .week-table { width: 100%; font-size: 11px; border-collapse: collapse; }
  .week-table th { text-align: left; color: var(--color-text-secondary); font-weight: 500; padding: 5px 8px; border-bottom: 0.5px solid var(--color-border-tertiary); }
  .week-table td { padding: 5px 8px; border-bottom: 0.5px solid var(--color-border-tertiary); color: var(--color-text-primary); }
  .week-table tr:last-child td { border-bottom: none; }
  .week-table td:not(:first-child) { text-align: right; }
  .week-table th:not(:first-child) { text-align: right; }
  .no-data { color: var(--color-text-secondary); font-size: 12px; padding: 20px; text-align: center; }
  .alert-box { background: #FAEEDA; border-left: 3px solid #BA7517; border-radius: 0 var(--border-radius-md) var(--border-radius-md) 0; padding: 10px 14px; margin-bottom: 16px; font-size: 12px; color: #412402; }
  .alert-box b { font-weight: 500; display: block; margin-bottom: 2px; }
</style>

<div class="kpi-dash">
  <div class="top-bar">
    <div>
      <div style="font-size:16px;font-weight:500;color:var(--color-text-primary);">SCM KPI — 외주생산파트</div>
      <div class="sub">2026년 구매조달팀 · 자동 집계</div>
    </div>
    <div class="controls">
      <div class="seg">
        <button class="active" onclick="setMode('monthly',this)">월별</button>
        <button onclick="setMode('weekly',this)">주별</button>
      </div>
      <select id="periodSel" onchange="render()"></select>
    </div>
  </div>

  <div id="alertBox"></div>
  <div class="cards" id="metricCards"></div>

  <div class="section">
    <div class="sec-title">발주건수 추이</div>
    <div class="legend">
      <span><b style="background:#378ADD"></b>발주건수</span>
      <span><b style="background:#E24B4A"></b>긴급건수</span>
      <span><b style="background:#EF9F27"></b>미입하</span>
    </div>
    <div class="chart-wrap" style="height:200px"><canvas id="orderChart" role="img" aria-label="발주건수, 긴급건수, 미입하 추이 바 차트">발주 KPI 추이 차트</canvas></div>
  </div>

  <div class="grid2">
    <div class="section">
      <div class="sec-title">이슈 분포</div>
      <div class="legend" id="issueLegend"></div>
      <div class="chart-wrap" style="height:180px"><canvas id="issueChart" role="img" aria-label="품질/수량/운영 이슈 분포">이슈 분포 차트</canvas></div>
    </div>
    <div class="section">
      <div class="sec-title">담당자별 발주</div>
      <div id="personList"></div>
    </div>
  </div>

  <div class="section">
    <div class="sec-title" id="tableTitle">주차별 상세</div>
    <div id="tableWrap"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const MONTHS = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

const monthlyData = {
  '1월': { orders:1071, urgent:101, noDeliver:20, quality:49, qty:3, ops:2, failCost:1033780, spend:6100000, persons:{김영준:49,김민정:33,김하은:67,이난영:1,김민지:254,육승미:550,신시어리웨일즈:117} },
  '2월': { orders:668, urgent:75, noDeliver:5, quality:20, qty:2, ops:1, failCost:321000, spend:3900000, persons:{김영준:27,김민정:21,김하은:29,이난영:0,김민지:137,육승미:376,신시어리웨일즈:78} },
  '3월': { orders:1155, urgent:151, noDeliver:25, quality:29, qty:3, ops:2, failCost:580000, spend:5800000, persons:{김영준:45,김민정:50,김하은:73,이난영:45,김민지:325,육승미:476,신시어리웨일즈:141} },
  '4월': { orders:297, urgent:49, noDeliver:2, quality:7, qty:0, ops:0, failCost:80500, spend:1200000, persons:{김영준:5,김민정:14,김하은:13,이난영:32,김민지:135,육승미:44,신시어리웨일즈:53} },
};

const weeklyData = {
  'W02 (01.05~01.11)': { orders:282, urgent:13, noDeliver:4, quality:12, qty:1, ops:0, failCost:0, spend:0 },
  'W03 (01.12~01.18)': { orders:346, urgent:66, noDeliver:9, quality:17, qty:1, ops:1, failCost:80500, spend:0 },
  'W04 (01.19~01.25)': { orders:235, urgent:16, noDeliver:3, quality:12, qty:1, ops:1, failCost:0, spend:0 },
  'W05 (01.26~02.01)': { orders:208, urgent:6,  noDeliver:4, quality:8,  qty:0, ops:0, failCost:0, spend:0 },
  'W06 (02.02~02.08)': { orders:191, urgent:23, noDeliver:2, quality:5,  qty:0, ops:0, failCost:0, spend:0 },
  'W07 (02.09~02.15)': { orders:185, urgent:19, noDeliver:0, quality:8,  qty:1, ops:0, failCost:0, spend:0 },
  'W08 (02.16~02.22)': { orders:109, urgent:8,  noDeliver:0, quality:3,  qty:0, ops:0, failCost:0, spend:0 },
  'W09 (02.23~03.01)': { orders:183, urgent:25, noDeliver:3, quality:4,  qty:1, ops:1, failCost:0, spend:0 },
  'W10 (03.02~03.08)': { orders:203, urgent:39, noDeliver:4, quality:3,  qty:0, ops:0, failCost:0, spend:0 },
  'W11 (03.09~03.15)': { orders:259, urgent:7,  noDeliver:7, quality:5,  qty:1, ops:1, failCost:0, spend:0 },
  'W12 (03.16~03.22)': { orders:218, urgent:33, noDeliver:6, quality:10, qty:1, ops:1, failCost:0, spend:0 },
  'W13 (03.23~03.29)': { orders:215, urgent:20, noDeliver:4, quality:3,  qty:0, ops:0, failCost:0, spend:0 },
  'W14 (03.30~04.05)': { orders:260, urgent:52, noDeliver:4, quality:8,  qty:1, ops:0, failCost:0, spend:0 },
  'W15 (04.06~04.12)': { orders:196, urgent:40, noDeliver:2, quality:7,  qty:0, ops:0, failCost:80500, spend:0 },
  'W16 (04.13~04.19)': { orders:101, urgent:9,  noDeliver:0, quality:0,  qty:0, ops:0, failCost:0, spend:0 },
};

let mode = 'monthly';
let orderChart = null, issueChart = null;

function setMode(m, btn) {
  mode = m;
  document.querySelectorAll('.seg button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  buildSelect();
  render();
}

function buildSelect() {
  const sel = document.getElementById('periodSel');
  const keys = mode === 'monthly' ? Object.keys(monthlyData) : Object.keys(weeklyData);
  sel.innerHTML = '';
  const allOpt = document.createElement('option');
  allOpt.value = 'all'; allOpt.textContent = mode === 'monthly' ? '전체 월' : '전체 주차';
  sel.appendChild(allOpt);
  keys.forEach(k => {
    const o = document.createElement('option');
    o.value = k; o.textContent = k; sel.appendChild(o);
  });
  sel.value = keys[keys.length - 1];
}

function getSelected() {
  const v = document.getElementById('periodSel').value;
  const src = mode === 'monthly' ? monthlyData : weeklyData;
  if (v === 'all') {
    const agg = { orders:0, urgent:0, noDeliver:0, quality:0, qty:0, ops:0, failCost:0, spend:0 };
    const persons = {};
    Object.values(src).forEach(d => {
      Object.keys(agg).forEach(k => agg[k] += d[k] || 0);
      if (d.persons) Object.entries(d.persons).forEach(([n,c]) => persons[n] = (persons[n]||0)+c);
    });
    if (Object.keys(persons).length) agg.persons = persons;
    return { key: 'all', data: agg };
  }
  const d = src[v];
  return { key: v, data: { ...d } };
}

function render() {
  const { key, data } = getSelected();
  const src = mode === 'monthly' ? monthlyData : weeklyData;
  const urgentRate = data.orders > 0 ? Math.round(data.urgent / data.orders * 100) : 0;
  const noDeliverRate = data.orders > 0 ? Math.round(data.noDeliver / data.orders * 100) : 0;
  const qualityMatchRate = 81;

  document.getElementById('alertBox').innerHTML = data.urgent > 100 ? `<div class="alert-box"><b>⚠ 긴급/미입하 동시 다발</b>긴급 ${data.urgent}건 · 미입하 ${data.noDeliver}건 · 실패비용 ${data.failCost.toLocaleString()}원</div>` : '';

  document.getElementById('metricCards').innerHTML = [
    ['총 발주건수', data.orders.toLocaleString(), '', 'neu'],
    ['긴급건수', data.urgent.toLocaleString(), `긴급률 ${urgentRate}%`, urgentRate > 15 ? 'up' : 'down'],
    ['미입하', data.noDeliver.toLocaleString(), `미입하율 ${noDeliverRate}%`, noDeliverRate > 2 ? 'up' : 'down'],
    ['품질이슈', data.quality.toLocaleString(), `수량${data.qty} / 운영${data.ops}`, 'neu'],
    ['실패비용', data.failCost > 0 ? data.failCost.toLocaleString()+'원' : '0원', data.failCost > 0 ? '발생' : '없음', data.failCost > 0 ? 'up' : 'neu'],
    ['품질 일치율', qualityMatchRate+'%', '등급 기준', qualityMatchRate >= 85 ? 'down' : 'up'],
  ].map(([l, v, d, cls]) => `<div class="card"><div class="label">${l}</div><div class="val">${v}</div><div class="delta ${cls}">${d}</div></div>`).join('');

  const allKeys = Object.keys(src);
  const labels = allKeys;
  const ordersArr = allKeys.map(k => src[k].orders);
  const urgentArr = allKeys.map(k => src[k].urgent);
  const noDelArr  = allKeys.map(k => src[k].noDeliver);

  if (orderChart) orderChart.destroy();
  orderChart = new Chart(document.getElementById('orderChart'), {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label:'발주건수', data: ordersArr, backgroundColor:'rgba(55,138,221,0.7)', borderRadius:3, order:3 },
        { label:'긴급건수', data: urgentArr, backgroundColor:'rgba(226,75,74,0.8)', borderRadius:3, order:2 },
        { label:'미입하',   data: noDelArr,  backgroundColor:'rgba(239,159,39,0.8)', borderRadius:3, order:1 },
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: { mode:'index' } },
      scales: {
        x: { stacked: false, grid: { display: false }, ticks: { font: { size: 10 }, autoSkip: false, maxRotation: 30 } },
        y: { grid: { color: 'rgba(128,128,128,0.1)' }, ticks: { font: { size: 10 } } }
      }
    }
  });

  const issueColors = ['#378ADD','#E24B4A','#EF9F27'];
  const issueLabelNames = ['품질이슈','수량이슈','운영이슈'];
  const issueVals = [data.quality, data.qty, data.ops];
  document.getElementById('issueLegend').innerHTML = issueLabelNames.map((n,i) => `<span><b style="background:${issueColors[i]}"></b>${n} ${issueVals[i]}</span>`).join('');

  if (issueChart) issueChart.destroy();
  issueChart = new Chart(document.getElementById('issueChart'), {
    type: 'doughnut',
    data: {
      labels: issueLabelNames,
      datasets: [{ data: issueVals, backgroundColor: issueColors, borderWidth: 2, borderColor: 'transparent' }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      cutout: '62%',
      plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ` ${ctx.label}: ${ctx.raw}건` } } }
    }
  });

  const persons = data.persons || { 육승미:550, 김민지:254, 신시어리웨일즈:117, 김하은:67, 김영준:49, 김민정:33, 이난영:1 };
  const maxP = Math.max(...Object.values(persons));
  document.getElementById('personList').innerHTML = Object.entries(persons)
    .sort(([,a],[,b]) => b - a)
    .map(([n,c]) => `<div class="person-row"><span style="min-width:70px">${n}</span><div class="person-bar-bg"><div class="person-bar" style="width:${Math.round(c/maxP*100)}%"></div></div><span style="min-width:30px;text-align:right">${c}</span></div>`)
    .join('');

  document.getElementById('tableTitle').textContent = mode === 'monthly' ? '월별 상세 지표' : '주차별 상세 지표';
  const rows = Object.entries(src).map(([k, d]) => {
    const ur = d.orders > 0 ? Math.round(d.urgent/d.orders*100) : 0;
    const nr = d.orders > 0 ? Math.round(d.noDeliver/d.orders*100) : 0;
    const uBadge = ur > 15 ? 'badge-danger' : ur > 10 ? 'badge-warn' : 'badge-ok';
    const nBadge = nr > 2 ? 'badge-warn' : 'badge-ok';
    return `<tr>
      <td>${k}</td>
      <td>${d.orders.toLocaleString()}</td>
      <td><span class="badge ${uBadge}">${d.urgent} (${ur}%)</span></td>
      <td><span class="badge ${nBadge}">${d.noDeliver} (${nr}%)</span></td>
      <td>${d.quality}</td>
      <td>${d.failCost > 0 ? d.failCost.toLocaleString()+'원' : '-'}</td>
    </tr>`;
  }).join('');
  document.getElementById('tableWrap').innerHTML = `<table class="week-table">
    <thead><tr><th>${mode === 'monthly' ? '월' : '주차'}</th><th>발주건수</th><th>긴급</th><th>미입하</th><th>품질이슈</th><th>실패비용</th></tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

buildSelect();
render();
</script>
